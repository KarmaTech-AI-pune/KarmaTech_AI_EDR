# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master", "Kiro/dev" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: List root directory
      run: ls -R    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore backend/EDR_backend.sln
    - name: Build
      run: dotnet build backend/EDR_backend.sln --no-restore
    - name: Test (Unit & Integration)
      run: dotnet test backend/EDR_backend.sln --no-build --verbosity normal --filter "Category!=Regression"
