# ====================================================================
# Development Deployment with Automatic Release Tagging
# ====================================================================
# This workflow deploys to DEV environment and creates release tags
# Trigger: Push to Saas/dev branch with frontend/backend changes

name: Deploy to DEV with Release Tags

on:
  push:
    branches: [ Saas/dev ]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/deploy-dev-with-tags.yml'
  workflow_dispatch:
    inputs:
      version-bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  AWS_REGION: us-east-1
  CERTIFICATE_ARN: arn:aws:acm:us-east-1:008971635132:certificate/20320ffc-0572-4e4e-9945-ef681c0a5937
  AWS_ACCOUNT_ID: 008971635132
  ENVIRONMENT: dev

jobs:
  # ================================================================
  # Job 1: Create Release Tag
  # ================================================================
  create-release-tag:
    name: Create DEV Release Tag
    uses: ./.github/workflows/create-release-tags.yml
    with:
      environment: dev
      component: full
      version-bump: ${{ github.event.inputs.version-bump || 'patch' }}
    permissions:
      contents: write

  # ================================================================
  # Job 2: Deploy Infrastructure
  # ================================================================
  deploy-infrastructure:
    name: Deploy Frontend Infrastructure
    runs-on: ubuntu-latest
    needs: create-release-tag
    outputs:
      admin-bucket: ${{ steps.stacks.outputs.admin-bucket }}
      tenant-bucket: ${{ steps.stacks.outputs.tenant-bucket }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Admin CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file aws-frontend-admin-simple.yml \
            --stack-name njs-admin-frontend-dev \
            --parameter-overrides CertificateArn=${{ env.CERTIFICATE_ARN }} \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset \
            --tags \
              Environment=dev \
              Version=${{ needs.create-release-tag.outputs.release-version }} \
              ReleaseTag=${{ needs.create-release-tag.outputs.release-tag }} \
              DeployedBy=${{ github.actor }} \
              DeployedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

      - name: Deploy Tenant CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file aws-frontend-tenant-simple.yml \
            --stack-name njs-tenant-frontend-dev \
            --parameter-overrides CertificateArn=${{ env.CERTIFICATE_ARN }} \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset \
            --tags \
              Environment=dev \
              Version=${{ needs.create-release-tag.outputs.release-version }} \
              ReleaseTag=${{ needs.create-release-tag.outputs.release-tag }} \
              DeployedBy=${{ github.actor }} \
              DeployedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

      - name: Get Stack Outputs
        id: stacks
        run: |
          ADMIN_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name njs-admin-frontend-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`AdminS3BucketName`].OutputValue' \
            --output text)
          
          TENANT_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name njs-tenant-frontend-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`TenantS3BucketName`].OutputValue' \
            --output text)
          
          echo "admin-bucket=$ADMIN_BUCKET" >> $GITHUB_OUTPUT
          echo "tenant-bucket=$TENANT_BUCKET" >> $GITHUB_OUTPUT

  # ================================================================
  # Job 3: Deploy Admin Application
  # ================================================================
  deploy-admin-app:
    name: Deploy Admin Application
    runs-on: ubuntu-latest
    needs: [create-release-tag, deploy-infrastructure]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Create admin environment file with version
        working-directory: ./frontend
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=https://api.app.karmatech-ai.com/
          VITE_APP_ENV=dev
          VITE_MAIN_DOMAIN=edr-admin.app.karmatech-ai.com
          VITE_APP_TYPE=admin
          VITE_APP_VERSION=${{ needs.create-release-tag.outputs.release-tag }}
          VITE_BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          VITE_COMMIT_SHA=${{ github.sha }}
          EOF

      - name: Build admin application
        working-directory: ./frontend
        run: npm run build

      - name: Create version manifest
        working-directory: ./frontend/dist
        run: |
          cat > version.json <<EOF
          {
            "version": "${{ needs.create-release-tag.outputs.release-tag }}",
            "semanticVersion": "${{ needs.create-release-tag.outputs.release-version }}",
            "environment": "dev",
            "component": "admin",
            "buildDate": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commitSha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "deployedBy": "${{ github.actor }}"
          }
          EOF

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to admin S3 bucket
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.deploy-infrastructure.outputs.admin-bucket }} --delete

      - name: Invalidate admin CloudFront cache
        run: |
          ADMIN_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[0]=='edr-admin.app.karmatech-ai.com'].Id" \
            --output text)
          
          if [ -n "$ADMIN_DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $ADMIN_DIST_ID \
              --paths "/*"
          fi

  # ================================================================
  # Job 4: Deploy Tenant Application
  # ================================================================
  deploy-tenant-app:
    name: Deploy Tenant Application
    runs-on: ubuntu-latest
    needs: [create-release-tag, deploy-infrastructure]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Create tenant environment file with version
        working-directory: ./frontend
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=https://api.app.karmatech-ai.com/
          VITE_APP_ENV=dev
          VITE_MAIN_DOMAIN=app.karmatech-ai.com
          VITE_APP_TYPE=tenant
          VITE_APP_VERSION=${{ needs.create-release-tag.outputs.release-tag }}
          VITE_BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          VITE_COMMIT_SHA=${{ github.sha }}
          EOF

      - name: Build tenant application
        working-directory: ./frontend
        run: npm run build

      - name: Create version manifest
        working-directory: ./frontend/dist
        run: |
          cat > version.json <<EOF
          {
            "version": "${{ needs.create-release-tag.outputs.release-tag }}",
            "semanticVersion": "${{ needs.create-release-tag.outputs.release-version }}",
            "environment": "dev",
            "component": "tenant",
            "buildDate": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commitSha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "deployedBy": "${{ github.actor }}"
          }
          EOF

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to tenant S3 bucket
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.deploy-infrastructure.outputs.tenant-bucket }} --delete

      - name: Invalidate tenant CloudFront cache
        run: |
          TENANT_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[0]=='app.karmatech-ai.com' || Aliases.Items[0]=='*.app.karmatech-ai.com'].Id" \
            --output text | head -1)
          
          if [ -n "$TENANT_DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $TENANT_DIST_ID \
              --paths "/*"
          fi

  # ================================================================
  # Job 5: Deployment Summary
  # ================================================================
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [create-release-tag, deploy-admin-app, deploy-tenant-app]
    if: always()
    
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 DEV Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏷️ Release Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Tag:** \`${{ needs.create-release-tag.outputs.release-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ needs.create-release-tag.outputs.release-version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** DEV" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Deployed URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **Admin:** https://edr-admin.app.karmatech-ai.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Tenant:** https://app.karmatech-ai.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Deployment Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy-admin-app.result }}" = "success" ] && [ "${{ needs.deploy-tenant-app.result }}" = "success" ]; then
            echo "✅ **SUCCESS** - All components deployed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **PARTIAL** - Some components failed. Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Version Info" >> $GITHUB_STEP_SUMMARY
          echo "Access version information at:" >> $GITHUB_STEP_SUMMARY
          echo "- https://edr-admin.app.karmatech-ai.com/version.json" >> $GITHUB_STEP_SUMMARY
          echo "- https://app.karmatech-ai.com/version.json" >> $GITHUB_STEP_SUMMARY
