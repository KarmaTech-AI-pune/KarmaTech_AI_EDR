# ====================================================================
# Deployment with Automatic Environment-Specific Version Tagging
# ====================================================================
# This workflow deploys to any environment and creates version tags
# Tag format: v{MAJOR}.{MINOR}.{PATCH}-{ENV}.{DATE}.{BUILD}
# Production also creates clean tag: v{MAJOR}.{MINOR}.{PATCH}
# Trigger: Push to Saas/dev branch with frontend/backend changes

name: Deploy with Version Tags

on:
  push:
    branches: [ Kiro/dev ]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/deploy-dev-with-tags.yml'
  workflow_dispatch:
    inputs:
      version-bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  AWS_REGION: us-east-1
  CERTIFICATE_ARN: arn:aws:acm:us-east-1:008971635132:certificate/20320ffc-0572-4e4e-9945-ef681c0a5937
  AWS_ACCOUNT_ID: 008971635132
  ENVIRONMENT: dev

jobs:
  # ================================================================
  # Job 1: Determine Environment and Create Version Tag
  # ================================================================
  create-version-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version-tag: ${{ steps.version-integration.outputs.environment_version_tag }}
      version: ${{ steps.version-integration.outputs.new_version }}
      environment: ${{ steps.version-integration.outputs.environment }}
      build-number: ${{ steps.version-integration.outputs.build_number }}
      commit-sha: ${{ steps.version-integration.outputs.commit_sha }}
      release-notes-generated: ${{ steps.generate-release-notes.outputs.release-notes-generated }}
      api-data-available: ${{ steps.generate-release-notes.outputs.api-data-available }}
      api-data-file: ${{ steps.generate-release-notes.outputs.api-data-file }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine Environment from Branch
        id: determine-env
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          echo "Branch name: $BRANCH_NAME"
          
          # Determine environment based on branch name
          case "$BRANCH_NAME" in
            "Kiro/dev"|"kiro/dev"|"dev")
              ENVIRONMENT="dev"
              ;;
            "staging")
              ENVIRONMENT="staging"
              ;;
            "qa")
              ENVIRONMENT="qa"
              ;;
            "main"|"master"|"production")
              ENVIRONMENT="prod"
              ;;
            *)
              echo "⚠️ Unknown branch: $BRANCH_NAME. Defaulting to dev environment."
              ENVIRONMENT="dev"
              ;;
          esac
          
          echo "Determined environment: $ENVIRONMENT"
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT

      - name: Setup Node.js for version calculation
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Make version scripts executable
        run: |
          chmod +x .github/scripts/create-version-tag.sh
          chmod +x .github/scripts/version-calculator.js
          chmod +x .github/scripts/github-actions-version-integration.js
          chmod +x .github/scripts/generate-release-notes.js

      - name: Calculate Version and Create Tags
        id: version-integration
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION_INCREMENT: ${{ github.event.inputs.version-bump }}
        run: |
          echo "🚀 Starting enhanced version calculation and integration..."
          
          # Use enhanced GitHub Actions integration script
          if [ -n "${{ github.event.inputs.version-bump }}" ]; then
            echo "🔧 Manual version increment specified: ${{ github.event.inputs.version-bump }}"
            # For manual override, we'll still use the integration script but set the increment
            export MANUAL_INCREMENT="${{ github.event.inputs.version-bump }}"
          fi
          
          # Run the enhanced integration script
          node .github/scripts/github-actions-version-integration.js --base origin/Kiro/dev --head HEAD
          
          echo "✅ Version integration completed successfully"



      - name: Validate Version Integration Success
        run: |
          echo "🔍 Validating version integration results..."
          
          # Check integration success status (Requirement: 4.4 - Prevent deployment on version errors)
          if [ "${{ steps.version-integration.outputs.integration_success }}" != "true" ]; then
            echo "❌ Version integration failed!"
            echo "🚨 DEPLOYMENT BLOCKED - Version calculation errors detected"
            echo ""
            echo "Error Details:"
            echo "  Message: ${{ steps.version-integration.outputs.error_message }}"
            echo "  Deployment Blocked: ${{ steps.version-integration.outputs.deployment_blocked }}"
            echo ""
            echo "Please check the version integration logs above for details."
            exit 1
          fi
          
          # Check if deployment was explicitly blocked
          if [ "${{ steps.version-integration.outputs.deployment_blocked }}" = "true" ]; then
            echo "❌ Deployment was explicitly blocked!"
            echo "🚨 Reason: ${{ steps.version-integration.outputs.block_reason }}"
            exit 1
          fi
          
          # Check that all required outputs are available
          if [ -z "${{ steps.version-integration.outputs.new_version }}" ]; then
            echo "❌ Version output is missing!"
            echo "🚨 DEPLOYMENT BLOCKED - Cannot proceed without version information"
            exit 1
          fi
          
          if [ -z "${{ steps.version-integration.outputs.environment }}" ]; then
            echo "❌ Environment output is missing!"
            echo "🚨 DEPLOYMENT BLOCKED - Cannot proceed without environment information"
            exit 1
          fi
          
          # Check version synchronization (Requirement: 3.5, 4.5)
          if [ "${{ steps.version-integration.outputs.version_sync_status }}" != "synchronized" ]; then
            echo "❌ Version files are not synchronized!"
            echo "🚨 DEPLOYMENT BLOCKED - Version mismatch detected"
            echo ""
            echo "This indicates that VERSION file and package.json have different versions."
            echo "Please verify version files are consistent before deploying."
            exit 1
          fi
          
          # Check execution time (Requirement: 7.3 - within 30 seconds)
          EXEC_TIME="${{ steps.version-integration.outputs.execution_time }}"
          if [ -n "$EXEC_TIME" ]; then
            # Remove decimal for comparison
            EXEC_TIME_INT=$(echo "$EXEC_TIME" | cut -d'.' -f1)
            if [ "$EXEC_TIME_INT" -gt 30 ]; then
              echo "⚠️ Warning: Version calculation took ${EXEC_TIME}s (target: 30s)"
            fi
          fi
          
          echo "✅ Version integration validation passed"
          echo "✅ Version: ${{ steps.version-integration.outputs.new_version }}"
          echo "✅ Environment: ${{ steps.version-integration.outputs.environment }}"
          echo "✅ Execution time: ${{ steps.version-integration.outputs.execution_time }}s"
          echo "✅ Version sync status: ${{ steps.version-integration.outputs.version_sync_status }}"
          echo "✅ Ready for deployment"

      - name: Generate Release Notes
        id: generate-release-notes
        env:
          VERSION_TAG: ${{ steps.version-integration.outputs.environment_version_tag }}
          ENVIRONMENT: ${{ steps.version-integration.outputs.environment }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          echo "📝 Generating release notes for $VERSION_TAG..."
          
          # Generate release notes using the new script
          node .github/scripts/generate-release-notes.js \
            --version "$VERSION_TAG" \
            --environment "$ENVIRONMENT" \
            --commit-sha "$COMMIT_SHA"
          
          echo "✅ Release notes generation completed"
          
          # Set outputs for later jobs
          echo "release-notes-generated=true" >> $GITHUB_OUTPUT
          
          # Check if API data file was created
          if [ -f ".github/release-notes/api-data.json" ]; then
            echo "api-data-available=true" >> $GITHUB_OUTPUT
            echo "api-data-file=.github/release-notes/api-data.json" >> $GITHUB_OUTPUT
          else
            echo "api-data-available=false" >> $GITHUB_OUTPUT
          fi

      - name: Log Version Information
        run: |
          echo "## 🏷️ Automatic Version Integration Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Version Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment Version Tag:** \`${{ steps.version-integration.outputs.environment_version_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Semantic Version:** \`${{ steps.version-integration.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Clean Version Tag:** \`${{ steps.version-integration.outputs.version_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** \`${{ steps.version-integration.outputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Number:** \`${{ steps.version-integration.outputs.build_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Increment Type:** \`${{ steps.version-integration.outputs.increment_type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Notes" >> $GITHUB_STEP_SUMMARY
          echo "- **Generated:** ${{ steps.generate-release-notes.outputs.release-notes-generated }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API Data Available:** ${{ steps.generate-release-notes.outputs.api-data-available }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.generate-release-notes.outputs.api-data-available }}" = "true" ]; then
            echo "- **API Data File:** \`${{ steps.generate-release-notes.outputs.api-data-file }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Integration Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Commits Analyzed:** ${{ steps.version-integration.outputs.commits_analyzed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Execution Time:** ${{ steps.version-integration.outputs.execution_time }} seconds" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Sync Status:** ${{ steps.version-integration.outputs.version_sync_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Integration Success:** ${{ steps.version-integration.outputs.integration_success }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files Updated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ VERSION file" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ frontend/package.json" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ .NET project files" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Git tags created and pushed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Release notes generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [View Environment Tag](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version-integration.outputs.environment_version_tag }})" >> $GITHUB_STEP_SUMMARY
          echo "- [View Clean Tag](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version-integration.outputs.version_tag }})" >> $GITHUB_STEP_SUMMARY
          echo "- [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY

  # ================================================================
  # Job 2: Store Release Notes in Database
  # ================================================================
  store-release-notes:
    name: Store Release Notes
    runs-on: ubuntu-latest
    needs: create-version-tag
    if: needs.create-version-tag.outputs.api-data-available == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Release Notes Data
        run: |
          echo "📥 Downloading release notes data..."
          # The API data file should be available from the previous job
          if [ -f "${{ needs.create-version-tag.outputs.api-data-file }}" ]; then
            echo "✅ Release notes data file found"
            cat "${{ needs.create-version-tag.outputs.api-data-file }}"
          else
            echo "❌ Release notes data file not found"
            exit 1
          fi

      - name: Store Release Notes in Database
        id: store-notes
        env:
          VERSION_TAG: ${{ needs.create-version-tag.outputs.version-tag }}
          ENVIRONMENT: ${{ needs.create-version-tag.outputs.environment }}
          API_DATA_FILE: ${{ needs.create-version-tag.outputs.api-data-file }}
        run: |
          echo "💾 Storing release notes in database..."
          
          # Make the storage script executable
          chmod +x .github/scripts/store-release-notes.js
          
          # Store release notes using the dedicated script
          node .github/scripts/store-release-notes.js \
            --api-url "https://api.app.karmatech-ai.com/api/release-notes" \
            --data-file "$API_DATA_FILE"
          
          echo "✅ Release notes storage completed"

      - name: Create GitHub Release
        if: needs.create-version-tag.outputs.environment == 'dev'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.create-version-tag.outputs.version-tag }}
          release_name: Release ${{ needs.create-version-tag.outputs.version-tag }}
          body: |
            # Development Release ${{ needs.create-version-tag.outputs.version-tag }}
            
            **Environment:** Development
            **Build Number:** ${{ needs.create-version-tag.outputs.build-number }}
            **Commit:** ${{ needs.create-version-tag.outputs.commit-sha }}
            **Deployed:** ${{ github.event.head_commit.timestamp }}
            **Deployed by:** ${{ github.actor }}
            
            ## 📝 Release Notes
            
            Detailed release notes with categorized changes are available in the application UI.
            
            ## 🚀 Deployment URLs
            
            - **Admin Portal:** https://edr-admin.app.karmatech-ai.com
            - **Tenant Portal:** https://app.karmatech-ai.com
            
            ## 📊 Version Information
            
            - **Version:** `${{ needs.create-version-tag.outputs.version-tag }}`
            - **Environment:** `${{ needs.create-version-tag.outputs.environment }}`
            - **Branch:** `${{ github.ref_name }}`
            - **Workflow Run:** [${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          draft: false
          prerelease: true

  # ================================================================
  # Job 3: Deploy Infrastructure
  # ================================================================
  deploy-infrastructure:
    name: Deploy Frontend Infrastructure
    runs-on: ubuntu-latest
    needs: [create-version-tag, store-release-notes]
    if: always() && needs.create-version-tag.result == 'success'
    outputs:
      admin-bucket: ${{ steps.stacks.outputs.admin-bucket }}
      tenant-bucket: ${{ steps.stacks.outputs.tenant-bucket }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Admin CloudFormation Stack
        env:
          VERSION_TAG: ${{ needs.create-version-tag.outputs.version-tag }}
          VERSION: ${{ needs.create-version-tag.outputs.version }}
          ENVIRONMENT: ${{ needs.create-version-tag.outputs.environment }}
        run: |
          echo "Deploying with version tag: $VERSION_TAG"
          aws cloudformation deploy \
            --template-file aws-frontend-admin-simple.yml \
            --stack-name njs-admin-frontend-${{ needs.create-version-tag.outputs.environment }} \
            --parameter-overrides CertificateArn=${{ env.CERTIFICATE_ARN }} \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset \
            --tags \
              Environment=${{ needs.create-version-tag.outputs.environment }} \
              Version=${{ needs.create-version-tag.outputs.version }} \
              VersionTag=${{ needs.create-version-tag.outputs.version-tag }} \
              DeployedBy=${{ github.actor }} \
              DeployedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

      - name: Deploy Tenant CloudFormation Stack
        env:
          VERSION_TAG: ${{ needs.create-version-tag.outputs.version-tag }}
          VERSION: ${{ needs.create-version-tag.outputs.version }}
          ENVIRONMENT: ${{ needs.create-version-tag.outputs.environment }}
        run: |
          echo "Deploying with version tag: $VERSION_TAG"
          aws cloudformation deploy \
            --template-file aws-frontend-tenant-simple.yml \
            --stack-name njs-tenant-frontend-${{ needs.create-version-tag.outputs.environment }} \
            --parameter-overrides CertificateArn=${{ env.CERTIFICATE_ARN }} \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset \
            --tags \
              Environment=${{ needs.create-version-tag.outputs.environment }} \
              Version=${{ needs.create-version-tag.outputs.version }} \
              VersionTag=${{ needs.create-version-tag.outputs.version-tag }} \
              DeployedBy=${{ github.actor }} \
              DeployedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

      - name: Get Stack Outputs
        id: stacks
        run: |
          ADMIN_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name njs-admin-frontend-${{ needs.create-version-tag.outputs.environment }} \
            --query 'Stacks[0].Outputs[?OutputKey==`AdminS3BucketName`].OutputValue' \
            --output text)
          
          TENANT_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name njs-tenant-frontend-${{ needs.create-version-tag.outputs.environment }} \
            --query 'Stacks[0].Outputs[?OutputKey==`TenantS3BucketName`].OutputValue' \
            --output text)
          
          echo "admin-bucket=$ADMIN_BUCKET" >> $GITHUB_OUTPUT
          echo "tenant-bucket=$TENANT_BUCKET" >> $GITHUB_OUTPUT

  # ================================================================
  # Job 3: Deploy Admin Application
  # ================================================================
  deploy-admin-app:
    name: Deploy Admin Application
    runs-on: ubuntu-latest
    needs: [create-version-tag, deploy-infrastructure]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Create admin environment file with version
        working-directory: ./frontend
        env:
          VERSION_TAG: ${{ needs.create-version-tag.outputs.version-tag }}
          VERSION: ${{ needs.create-version-tag.outputs.version }}
          ENVIRONMENT: ${{ needs.create-version-tag.outputs.environment }}
          COMMIT_SHA: ${{ needs.create-version-tag.outputs.commit-sha }}
        run: |
          echo "Creating environment file with version: $VERSION_TAG"
          cat > .env.production <<EOF
          VITE_API_BASE_URL=https://api.app.karmatech-ai.com/
          VITE_APP_ENV=${{ needs.create-version-tag.outputs.environment }}
          VITE_MAIN_DOMAIN=edr-admin.app.karmatech-ai.com
          VITE_APP_TYPE=admin
          VITE_APP_VERSION=${{ needs.create-version-tag.outputs.version-tag }}
          VITE_BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          VITE_COMMIT_SHA=${{ needs.create-version-tag.outputs.commit-sha }}
          EOF

      - name: Build admin application
        working-directory: ./frontend
        run: npm run build

      - name: Create version manifest
        working-directory: ./frontend/dist
        env:
          VERSION_TAG: ${{ needs.create-version-tag.outputs.version-tag }}
          VERSION: ${{ needs.create-version-tag.outputs.version }}
          ENVIRONMENT: ${{ needs.create-version-tag.outputs.environment }}
          COMMIT_SHA: ${{ needs.create-version-tag.outputs.commit-sha }}
        run: |
          cat > version.json <<EOF
          {
            "version": "${{ needs.create-version-tag.outputs.version-tag }}",
            "semanticVersion": "${{ needs.create-version-tag.outputs.version }}",
            "environment": "${{ needs.create-version-tag.outputs.environment }}",
            "component": "admin",
            "buildNumber": "${{ needs.create-version-tag.outputs.build-number }}",
            "buildDate": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commitSha": "${{ needs.create-version-tag.outputs.commit-sha }}",
            "branch": "${{ github.ref_name }}",
            "deployedBy": "${{ github.actor }}"
          }
          EOF

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to admin S3 bucket
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.deploy-infrastructure.outputs.admin-bucket }} --delete

      - name: Invalidate admin CloudFront cache
        run: |
          ADMIN_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[0]=='edr-admin.app.karmatech-ai.com'].Id" \
            --output text)
          
          if [ -n "$ADMIN_DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $ADMIN_DIST_ID \
              --paths "/*"
          fi

  # ================================================================
  # Job 4: Deploy Tenant Application
  # ================================================================
  deploy-tenant-app:
    name: Deploy Tenant Application
    runs-on: ubuntu-latest
    needs: [create-version-tag, deploy-infrastructure]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Create tenant environment file with version
        working-directory: ./frontend
        env:
          VERSION_TAG: ${{ needs.create-version-tag.outputs.version-tag }}
          VERSION: ${{ needs.create-version-tag.outputs.version }}
          ENVIRONMENT: ${{ needs.create-version-tag.outputs.environment }}
          COMMIT_SHA: ${{ needs.create-version-tag.outputs.commit-sha }}
        run: |
          echo "Creating environment file with version: $VERSION_TAG"
          cat > .env.production <<EOF
          VITE_API_BASE_URL=https://api.app.karmatech-ai.com/
          VITE_APP_ENV=${{ needs.create-version-tag.outputs.environment }}
          VITE_MAIN_DOMAIN=app.karmatech-ai.com
          VITE_APP_TYPE=tenant
          VITE_APP_VERSION=${{ needs.create-version-tag.outputs.version-tag }}
          VITE_BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          VITE_COMMIT_SHA=${{ needs.create-version-tag.outputs.commit-sha }}
          EOF

      - name: Build tenant application
        working-directory: ./frontend
        run: npm run build

      - name: Create version manifest
        working-directory: ./frontend/dist
        env:
          VERSION_TAG: ${{ needs.create-version-tag.outputs.version-tag }}
          VERSION: ${{ needs.create-version-tag.outputs.version }}
          ENVIRONMENT: ${{ needs.create-version-tag.outputs.environment }}
          COMMIT_SHA: ${{ needs.create-version-tag.outputs.commit-sha }}
        run: |
          cat > version.json <<EOF
          {
            "version": "${{ needs.create-version-tag.outputs.version-tag }}",
            "semanticVersion": "${{ needs.create-version-tag.outputs.version }}",
            "environment": "${{ needs.create-version-tag.outputs.environment }}",
            "component": "tenant",
            "buildNumber": "${{ needs.create-version-tag.outputs.build-number }}",
            "buildDate": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commitSha": "${{ needs.create-version-tag.outputs.commit-sha }}",
            "branch": "${{ github.ref_name }}",
            "deployedBy": "${{ github.actor }}"
          }
          EOF

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to tenant S3 bucket
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.deploy-infrastructure.outputs.tenant-bucket }} --delete

      - name: Invalidate tenant CloudFront cache
        run: |
          TENANT_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[0]=='app.karmatech-ai.com' || Aliases.Items[0]=='*.app.karmatech-ai.com'].Id" \
            --output text | head -1)
          
          if [ -n "$TENANT_DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $TENANT_DIST_ID \
              --paths "/*"
          fi

  # ================================================================
  # Job 5: Deployment Summary
  # ================================================================
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [create-version-tag, store-release-notes, deploy-admin-app, deploy-tenant-app]
    if: always()
    
    steps:
      - name: Deployment Summary
        env:
          VERSION_TAG: ${{ needs.create-version-tag.outputs.version-tag }}
          VERSION: ${{ needs.create-version-tag.outputs.version }}
          ENVIRONMENT: ${{ needs.create-version-tag.outputs.environment }}
          BUILD_NUMBER: ${{ needs.create-version-tag.outputs.build-number }}
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏷️ Release Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Tag:** \`${{ needs.create-version-tag.outputs.version-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Semantic Version:** \`${{ needs.create-version-tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** \`${{ needs.create-version-tag.outputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Number:** \`${{ needs.create-version-tag.outputs.build-number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ needs.create-version-tag.outputs.commit-sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Release Notes" >> $GITHUB_STEP_SUMMARY
          echo "- **Generated:** ${{ needs.create-version-tag.outputs.release-notes-generated }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.create-version-tag.outputs.api-data-available }}" = "true" ]; then
            echo "- **Database Storage:** ${{ needs.store-release-notes.result }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Database Storage:** Skipped (no data available)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **GitHub Release:** Created for development environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Deployed URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **Admin:** https://edr-admin.app.karmatech-ai.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Tenant:** https://app.karmatech-ai.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Deployment Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy-admin-app.result }}" = "success" ] && [ "${{ needs.deploy-tenant-app.result }}" = "success" ]; then
            echo "✅ **SUCCESS** - All components deployed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **PARTIAL** - Some components failed. Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Version Info" >> $GITHUB_STEP_SUMMARY
          echo "Access version information at:" >> $GITHUB_STEP_SUMMARY
          echo "- https://edr-admin.app.karmatech-ai.com/version.json" >> $GITHUB_STEP_SUMMARY
          echo "- https://app.karmatech-ai.com/version.json" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [View Tag](https://github.com/${{ github.repository }}/releases/tag/${{ needs.create-version-tag.outputs.version-tag }})" >> $GITHUB_STEP_SUMMARY
          echo "- [View Commit](https://github.com/${{ github.repository }}/commit/${{ needs.create-version-tag.outputs.commit-sha }})" >> $GITHUB_STEP_SUMMARY
          echo "- [View Release Notes](https://github.com/${{ github.repository }}/releases/tag/${{ needs.create-version-tag.outputs.version-tag }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Admin Portal Release Notes](https://edr-admin.app.karmatech-ai.com/release-history)" >> $GITHUB_STEP_SUMMARY
          echo "- [Tenant Portal Release Notes](https://app.karmatech-ai.com/release-history)" >> $GITHUB_STEP_SUMMARY
