name: Auto Sync Deploy Repo

on:
  push:
    branches:
      - master   

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4

      - name: Clone Deploy Repo (shallow)
        run: |
          git clone --depth 1 --single-branch --branch Saas/dev \
            https://x-access-token:${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/ranadiveabhishek2001-creator/EDR_Project_Deploy_Test.git deploy

      - name: Copy Code (Replace only, no delete)
        run: |
          rsync -av \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude '*.pyc' \
            --exclude '.venv' \
            ./ deploy/

      - name: Push Changes
        run: |
          cd deploy
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto sync from master branch" || echo "No changes to commit"
          git push origin HEAD:Saas/dev