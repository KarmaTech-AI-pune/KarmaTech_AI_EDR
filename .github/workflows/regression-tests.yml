name: Regression Tests

on:
  pull_request:
    branches: [ "master", "Kiro/dev" ]
  schedule:
    # Run nightly at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  backend-regression:
    name: Backend Regression Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore backend/EDR_backend.sln

    - name: Run Regression Tests
      run: |
        dotnet test backend/EDR_backend.sln \
          --no-restore \
          --verbosity normal \
          --filter "FullyQualifiedName~Regression" \
          --logger "trx;LogFileName=regression-results.trx" \
          --results-directory backend/EDR.API.Tests/TestResults

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-regression-results
        path: backend/EDR.API.Tests/TestResults/

  frontend-regression:
    name: Frontend Regression Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      working-directory: frontend

    - name: Run Vitest Regression Tests
      run: npx vitest run test/regression/ --reporter=verbose
      working-directory: frontend

  e2e-regression:
    name: E2E Regression Tests
    runs-on: ubuntu-latest
    needs: [frontend-regression]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      working-directory: frontend

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      working-directory: frontend

    - name: Run E2E Regression Tests
      run: npx playwright test e2e/tests/regression/ --reporter=html
      working-directory: frontend

    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-regression-report
        path: frontend/playwright-report/
