name: Tag on PR Merge
run-name: "Create tag for PR #${{ github.event.pull_request.number }} on ${{ github.event.pull_request.base.ref }}"

on:
  pull_request:
    types: [closed]

jobs:
  create-tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push tags
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Set Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create new tag
        run: |
          # Example tag format: pr-123-20250915
          TAG_NAME="pr-${{ github.event.pull_request.number }}-$(date +'%Y%m%d')"
          
          echo "Creating tag: $TAG_NAME"
          git tag $TAG_NAME
          git push origin $TAG_NAME
