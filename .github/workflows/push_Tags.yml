name: Push PR Tag to Base Branch
run-name: "Sync tags on PR merge to ${{ github.event.pull_request.base.ref }}"

on:
  pull_request:
    types: [closed]   # fires when PR is closed/merged

jobs:
  push-tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push tag
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0       # fetch full history
          fetch-tags: true     # make sure tags are available

      - name: Set Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ------------------------------------------------------------------
      # OPTION 1: Push ALL tags from the PR head branch
      # ------------------------------------------------------------------
      - name: Copy all tags from head branch
        run: |
          git fetch origin refs/heads/${{ github.event.pull_request.head.ref }} --tags
          git push origin --tags

