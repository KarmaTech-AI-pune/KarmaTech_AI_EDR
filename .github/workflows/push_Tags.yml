name: Auto Tag Release on PR Merge
run-name: "Create release tag for ${{ github.event.pull_request.base.ref }} after PR #${{ github.event.pull_request.number }}"

on:
  pull_request:
    types: [closed]

jobs:
  create-tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version tag
        id: version
        run: |
          git fetch --tags

          # Only match semantic version tags (vX.Y.Z)
          latest_tag=$(git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n1)

          if [[ -z "$latest_tag" ]]; then
            new_tag="v1.0.0"
          else
            base=${latest_tag#v}
            major=$(echo $base | cut -d. -f1)
            minor=$(echo $base | cut -d. -f2)
            patch=$(echo $base | cut -d. -f3)

            # Default bump = patch
            bump="patch"

            # Check PR labels for bump type
            labels="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
            if echo "$labels" | grep -qi "major"; then
              bump="major"
            elif echo "$labels" | grep -qi "minor"; then
              bump="minor"
            fi

            case $bump in
              major)
                major=$((major+1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor+1))
                patch=0
                ;;
              patch)
                patch=$((patch+1))
                ;;
            esac

            new_tag="v$major.$minor.$patch"
          fi

          echo "latest=$latest_tag" >> $GITHUB_OUTPUT
          echo "new=$new_tag" >> $GITHUB_OUTPUT

      - name: Create and push new tag
        run: |
          echo "Latest tag: ${{ steps.version.outputs.latest }}"
          echo "New tag: ${{ steps.version.outputs.new }}"

          git tag ${{ steps.version.outputs.new }}
          git push origin ${{ steps.version.outputs.new }}
