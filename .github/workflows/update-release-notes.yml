name: Update Release Notes

on:
  push:
    branches: 
      - "Kiro/dev"
      - "release-notes-testing"

jobs:
  update-notes:
    name: Generate Latest Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Generate Release Notes
      id: generate
      run: |
        VERSION="v1.1.0-dev.$(date +%Y%m%d)"
        node .github/scripts/generate-release-notes.js --version "$VERSION" --environment dev
        echo "version=$VERSION" >> $GITHUB_OUTPUT
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit and push release notes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .github/release-notes/
        git commit -m "docs(release): auto-generated release notes for ${{ steps.generate.outputs.version }}" || echo "No changes to commit"
        git push origin ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
