name: Verify Merge to Dev

on:
  push:
    branches: [ "Kiro/dev" ]
  pull_request:
    branches: [ "Kiro/dev" ]

jobs:
  test:
    name: Run All Tests
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Run Tests
      shell: powershell
      run: .\RunTests.ps1
