name: Deploy Frontend both admin and tenant (PROD)

on:
  push:
    branches: [ master ]
    paths:
      - 'frontend/**'
      - 'aws-frontend-admin-simple.yml'
      - 'aws-frontend-tenant-simple.yml'
      - '.github/workflows/deploy-frontend-complete.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  CERTIFICATE_ARN: arn:aws:acm:us-east-1:510600232849:certificate/6a810784-ca11-4206-b4d1-383149ceccbd
  AWS_ACCOUNT_ID: 510600232849

jobs:
  deploy-infrastructure:
    name: Deploy Frontend Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Admin CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file aws-frontend-admin-simple.yml \
            --stack-name edr-admin-frontend-prod \
            --parameter-overrides CertificateArn=${{ env.CERTIFICATE_ARN }} \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: Deploy Tenant CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file aws-frontend-tenant-simple.yml \
            --stack-name edr-tenant-frontend-prod \
            --parameter-overrides CertificateArn=${{ env.CERTIFICATE_ARN }} \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: Get Stack Outputs
        id: stacks
        run: |
          ADMIN_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name edr-admin-frontend-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`AdminS3BucketName`].OutputValue' \
            --output text)

          TENANT_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name edr-tenant-frontend-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`TenantS3BucketName`].OutputValue' \
            --output text)

          ADMIN_CF=$(aws cloudformation describe-stacks \
            --stack-name edr-admin-frontend-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`AdminCloudFrontDomain`].OutputValue' \
            --output text)

          TENANT_CF=$(aws cloudformation describe-stacks \
            --stack-name edr-tenant-frontend-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`TenantCloudFrontDomain`].OutputValue' \
            --output text)

          echo "admin-bucket=$ADMIN_BUCKET" >> $GITHUB_OUTPUT
          echo "tenant-bucket=$TENANT_BUCKET" >> $GITHUB_OUTPUT
          echo "admin-cloudfront=$ADMIN_CF" >> $GITHUB_OUTPUT
          echo "tenant-cloudfront=$TENANT_CF" >> $GITHUB_OUTPUT

      - name: Infrastructure Summary
        run: |
          echo "## 🏗️ Infrastructure Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ CloudFormation Stacks Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Admin Stack: edr-admin-frontend-prod" >> $GITHUB_STEP_SUMMARY
          echo "- Tenant Stack: edr-tenant-frontend-prod" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 S3 Buckets Created" >> $GITHUB_STEP_SUMMARY
          echo "- Admin: ${{ steps.stacks.outputs.admin-bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tenant: ${{ steps.stacks.outputs.tenant-bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 CloudFront Distributions" >> $GITHUB_STEP_SUMMARY
          echo "- Admin: ${{ steps.stacks.outputs.admin-cloudfront }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tenant: ${{ steps.stacks.outputs.tenant-cloudfront }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Next: Add DNS Records to GoDaddy" >> $GITHUB_STEP_SUMMARY
          echo "- edr-admin.prod.karmatech-ai.com → ${{ steps.stacks.outputs.admin-cloudfront }}" >> $GITHUB_STEP_SUMMARY
          echo "- prod.karmatech-ai.com → ${{ steps.stacks.outputs.tenant-cloudfront }}" >> $GITHUB_STEP_SUMMARY
          echo "- *.prod.karmatech-ai.com → ${{ steps.stacks.outputs.tenant-cloudfront }}" >> $GITHUB_STEP_SUMMARY

    outputs:
      admin-bucket: ${{ steps.stacks.outputs.admin-bucket }}
      tenant-bucket: ${{ steps.stacks.outputs.tenant-bucket }}

  deploy-admin-app:
    name: Deploy Admin Application
    runs-on: ubuntu-latest
    needs: deploy-infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Create admin environment file
        working-directory: ./frontend
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=https://api.prod.karmatech-ai.com/
          VITE_APP_ENV=prod
          VITE_MAIN_DOMAIN=edr-admin.prod.karmatech-ai.com
          VITE_APP_TYPE=admin
          EOF

      - name: Validate API base URL is HTTPS
        working-directory: ./frontend
        run: |
          source .env.production
          if [[ ! "$VITE_API_BASE_URL" =~ ^https:// ]]; then
            echo "❌ VITE_API_BASE_URL must use HTTPS for production. Found: $VITE_API_BASE_URL"
            exit 1
          fi

      - name: Install SWC native binding for Linux
        working-directory: ./frontend
        run: npm install @swc/core --no-save --legacy-peer-deps

      - name: Install Rollup native binary for Linux
        working-directory: ./frontend
        run: npm install @rollup/rollup-linux-x64-gnu --no-save --legacy-peer-deps

      - name: Build admin application
        working-directory: ./frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to admin S3 bucket
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.deploy-infrastructure.outputs.admin-bucket }} --delete

      - name: Invalidate admin CloudFront cache
        run: |
          ADMIN_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, 'edr-admin.prod.karmatech-ai.com')].Id | [0]" \
            --output text)

          if [ -n "$ADMIN_DIST_ID" ] && [ "$ADMIN_DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $ADMIN_DIST_ID \
              --paths "/*"
          fi

      - name: Admin Deployment Summary
        run: |
          echo "## 🚀 Admin Frontend Deployment (PROD)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "- S3 Bucket: ${{ needs.deploy-infrastructure.outputs.admin-bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://edr-admin.prod.karmatech-ai.com" >> $GITHUB_STEP_SUMMARY

  deploy-tenant-app:
    name: Deploy Tenant Application
    runs-on: ubuntu-latest
    needs: deploy-infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Create tenant environment file
        working-directory: ./frontend
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=https://api.prod.karmatech-ai.com/
          VITE_APP_ENV=prod
          VITE_MAIN_DOMAIN=prod.karmatech-ai.com
          VITE_APP_TYPE=tenant
          EOF

      - name: Validate API base URL is HTTPS
        working-directory: ./frontend
        run: |
          source .env.production
          if [[ ! "$VITE_API_BASE_URL" =~ ^https:// ]]; then
            echo "❌ VITE_API_BASE_URL must use HTTPS for production. Found: $VITE_API_BASE_URL"
            exit 1
          fi

      - name: Install SWC native binding for Linux
        working-directory: ./frontend
        run: npm install @swc/core --no-save --legacy-peer-deps

      - name: Install Rollup native binary for Linux
        working-directory: ./frontend
        run: npm install @rollup/rollup-linux-x64-gnu --no-save --legacy-peer-deps

      - name: Build tenant application
        working-directory: ./frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to tenant S3 bucket
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.deploy-infrastructure.outputs.tenant-bucket }} --delete

      - name: Invalidate tenant CloudFront cache
        run: |
          TENANT_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, 'prod.karmatech-ai.com') || contains(Aliases.Items, '*.prod.karmatech-ai.com')].Id | [0]" \
            --output text)

          if [ -n "$TENANT_DIST_ID" ] && [ "$TENANT_DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $TENANT_DIST_ID \
              --paths "/*"
          fi

      - name: Tenant Deployment Summary
        run: |
          echo "## 🚀 Tenant Frontend Deployment (PROD)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "- S3 Bucket: ${{ needs.deploy-infrastructure.outputs.tenant-bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "- Main URL: https://prod.karmatech-ai.com" >> $GITHUB_STEP_SUMMARY
          echo "- Tenant URLs: https://*.prod.karmatech-ai.com" >> $GITHUB_STEP_SUMMARY