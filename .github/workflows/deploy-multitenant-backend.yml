name: Deploy Multi-Tenant Backend to AWS ECS
#editing again
on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      - 'Dockerfile.backend-only'
      - 'aws-ecs-task-definition-backend.json'
      - '.github/workflows/deploy-multitenant-backend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: edr-multitenant-backend
  ECS_CLUSTER_NAME: edr-multitenant-backend-cluster
  ECS_SERVICE_NAME: edr-multitenant-backend-service
  ECS_TASK_DEFINITION_NAME: edr-multitenant-backend-task
  ALB_TARGET_GROUP: edr-backend-tg
  IMAGE_TAG: ${{ github.sha }}
  IMAGE_TAG_LATEST: latest

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.image-uri.outputs.uri }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY_BACKEND }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          docker build -f Dockerfile.backend-only -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image-uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      - name: Image URI
        id: image-uri
        run: echo "uri=${{ steps.build-image.outputs.image-uri }}" >> $GITHUB_OUTPUT

  deploy-to-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Existing RDS Endpoint
        id: get-rds-endpoint
        run: |
          RDS_ENDPOINT=$(aws rds describe-db-instances --db-instance-identifier edr-database --query 'DBInstances[0].Endpoint.Address' --output text 2>/dev/null || echo "localhost")
          echo "endpoint=$RDS_ENDPOINT" >> $GITHUB_OUTPUT
      - name: Create CloudWatch Log Group
        run: |
          aws logs create-log-group --log-group-name /ecs/edr-multitenant-backend --region ${{ env.AWS_REGION }} || echo "Log group already exists"
      - name: Create ECS Task Definition
        id: task-def
        run: |
          cat > task-definition.json <<EOF
          {
            "family": "${{ env.ECS_TASK_DEFINITION_NAME }}",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "512",
            "memory": "1024",
            "executionRoleArn": "arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole",
            "taskRoleArn": "arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole",
            "containerDefinitions": [
              {
                "name": "edr-multitenant-backend",
                "image": "${{ needs.build-and-push.outputs.image-uri }}",
                "portMappings": [
                  {
                    "containerPort": 8080,
                    "protocol": "tcp"
                  }
                ],
                "environment": [
                  {
                    "name": "ASPNETCORE_ENVIRONMENT",
                    "value": "Development"
                  },
                  {
                    "name": "ASPNETCORE_URLS",
                    "value": "http://+:8080"
                  },
                  {
                    "name": "ConnectionStrings__AppDbConnection",
                    "value": "Host=edr-database.c6p022mwyjgz.us-east-1.rds.amazonaws.com;Port=5432;Database=KarmaTechAI_EDR_SAAS;Username=postgres;Password=Admin1234;SSL Mode=Require;Trust Server Certificate=true;"

                  }
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/edr-multitenant-backend",
                    "awslogs-region": "${{ env.AWS_REGION }}",
                    "awslogs-stream-prefix": "ecs"
                  }
                },
                "essential": true
              }
            ]
          }
          EOF
      - name: Register ECS Task Definition
        id: register-task-definition
        run: |
          TASK_DEF=$(cat task-definition.json)
          aws ecs register-task-definition --cli-input-json "$TASK_DEF"
          TASK_DEF_ARN=$(aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION_NAME }} --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT
      - name: Create ECS Cluster (if not exists)
        run: |
          if aws ecs describe-clusters --clusters ${{ env.ECS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }} --query 'clusters[0].status' --output text 2>/dev/null | grep -q "ACTIVE"; then
            echo "ECS cluster '${{ env.ECS_CLUSTER_NAME }}' already exists and is active"
          else
            echo "Creating ECS cluster '${{ env.ECS_CLUSTER_NAME }}'..."
            aws ecs create-cluster --cluster-name ${{ env.ECS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
            echo "ECS cluster '${{ env.ECS_CLUSTER_NAME }}' created successfully"
          fi
      - name: Get Subnet IDs
        id: get-subnets
        run: |
          echo "subnet-ids=${{ secrets.SUBNET_IDS }}" >> $GITHUB_OUTPUT
      - name: Get ALB Target Group ARN
        id: get-target-group
        run: |
          TARGET_GROUP_ARN=$(aws elbv2 describe-target-groups --names ${{ env.ALB_TARGET_GROUP }} --query 'TargetGroups[0].TargetGroupArn' --output text --region ${{ env.AWS_REGION }})
          echo "target-group-arn=$TARGET_GROUP_ARN" >> $GITHUB_OUTPUT
      - name: Create ECS Service (if not exists)
        run: |
          if ! aws ecs describe-services --cluster ${{ env.ECS_CLUSTER_NAME }} --services ${{ env.ECS_SERVICE_NAME }} --query 'services[0].status' --output text 2>/dev/null | grep -q "ACTIVE"; then
            echo "Creating ECS service..."
            aws ecs create-service \
              --cluster ${{ env.ECS_CLUSTER_NAME }} \
              --service-name ${{ env.ECS_SERVICE_NAME }} \
              --task-definition ${{ env.ECS_TASK_DEFINITION_NAME }} \
              --desired-count 1 \
              --launch-type FARGATE \
              --deployment-configuration "deploymentCircuitBreaker={enable=true,rollback=true},maximumPercent=200,minimumHealthyPercent=100" \
              --network-configuration "awsvpcConfiguration={subnets=[${{ steps.get-subnets.outputs.subnet-ids }}],securityGroups=[${{ secrets.NJS_API_ECS_SG }}],assignPublicIp=ENABLED}" \
              --load-balancers "targetGroupArn=${{ steps.get-target-group.outputs.target-group-arn }},containerName=edr-multitenant-backend,containerPort=8080" \
              --health-check-grace-period-seconds 300 \
              --region ${{ env.AWS_REGION }}
          else
            echo "ECS service already exists, updating..."
          fi
      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER_NAME }} \
            --service ${{ env.ECS_SERVICE_NAME }} \
            --task-definition ${{ steps.register-task-definition.outputs.task_def_arn }} \
            --desired-count 1 \
            --deployment-configuration "deploymentCircuitBreaker={enable=true,rollback=true},maximumPercent=200,minimumHealthyPercent=100" \
            --region ${{ env.AWS_REGION }}
      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER_NAME }} \
            --services ${{ env.ECS_SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }}
      - name: Get ALB DNS Name
        id: get-alb-dns
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers --names edr-multitenant-alb --query 'LoadBalancers[0].DNSName' --output text --region ${{ env.AWS_REGION }})
          echo "alb-dns=$ALB_DNS" >> $GITHUB_OUTPUT
      - name: Test API Health Check
        run: |
          echo "Testing API health check..."
          sleep 30
          curl -f http://${{ steps.get-alb-dns.outputs.alb-dns }}/health || echo "Health check failed, but deployment completed"
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-to-ecs]
    if: always()
    
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 Multi-Tenant Backend API Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Deployment Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy-to-ecs.result }}" = "success" ]; then
            echo "🟢 **SUCCESS**: Multi-tenant backend deployed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "🔴 **FAILED**: Deployment failed. Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ needs.build-and-push.outputs.image-uri }}" >> $GITHUB_STEP_SUMMARY
          echo "- **ECS Cluster**: ${{ env.ECS_CLUSTER_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **ECS Service**: ${{ env.ECS_SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Test Your API" >> $GITHUB_STEP_SUMMARY
          echo "Once deployed, test your API endpoints:" >> $GITHUB_STEP_SUMMARY
          echo "- **Health Check**: \`curl http://YOUR_ALB_DNS/health\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Swagger UI**: \`curl http://YOUR_ALB_DNS/swagger\`" >> $GITHUB_STEP_SUMMARY
          echo "- **API Base**: \`curl http://YOUR_ALB_DNS/api\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Test your API endpoints" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify multi-tenant functionality" >> $GITHUB_STEP_SUMMARY
          echo "3. Set up custom domain (optional)" >> $GITHUB_STEP_SUMMARY
          echo "4. Configure SSL certificate (optional)" >> $GITHUB_STEP_SUMMARY
